<div class="container">

  <h1>⚖️ Advocate AI</h1>

  <div class="card">
    <div id="chatBox"></div>

    <input id="input" placeholder="Ask legal question...">
    <button onclick="send()">Send</button>
  </div>

  <div class="card">
    <h3>FIR Generator</h3>

    <input id="name" placeholder="Name">
    <input id="father" placeholder="Father Name">
    <input id="address" placeholder="Address">
    <input id="accused" placeholder="Accused">
    <input id="police" placeholder="Police Station">
    <input id="date" placeholder="Date">
    <textarea id="problem"></textarea>

    <button onclick="generateFIR()">Generate FIR</button>
  </div>

</div>
